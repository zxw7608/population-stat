<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人口统计可视化</title>
  <style>
    .age-group-row { transition: opacity 0.15s; }
    .age-group-row.drag-over { border-top: 2px solid #0d6efd; }
    .drag-handle { cursor: grab; }
  </style>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.27/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="app">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <span class="navbar-brand">人口统计可视化</span>
          <a class="btn btn-sm btn-outline-light" href="https://github.com/zxw7608/population-stat" target="_blank" title="GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/></svg>
          </a>
      </div>
    </nav>
    <div class="container">
      <ul class="nav nav-tabs mb-4" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-trend" type="button">历史趋势</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-age" type="button">年龄分布与推演</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-data" type="button">数据管理</button>
        </li>
      </ul>
      <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-trend">
          <birth-death-chart :history-data="populationHistory" :mortality-rates="mortalityRates"></birth-death-chart>
        </div>
        <div class="tab-pane fade" id="tab-age">
          <age-distribution
            :distribution="ageDistribution"
            :age-groups="ageGroups"
          ></age-distribution>
          <hr class="my-4">
          <simulation-panel
            :history-data="populationHistory"
            :age-groups="ageGroups"
            :mortality-rates="mortalityRates"
          ></simulation-panel>
        </div>
        <div class="tab-pane fade" id="tab-data">
          <data-manager
            @update-history="onHistoryUpdate"
            @update-groups="onGroupsUpdate"
          ></data-manager>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="src/engine/age-classifier.js"></script>
  <script src="src/engine/population-engine.js"></script>
  <script src="src/engine/data-parser.js"></script>
  <script src="src/engine/cohort-calculator.js"></script>
  <script src="src/components/rate-input.js"></script>
  <script src="src/components/birth-death-chart.js"></script>
  <script src="src/components/age-distribution.js"></script>
  <script src="src/components/age-group-editor.js"></script>
  <script src="src/components/data-manager.js"></script>
  <script src="src/components/simulation-panel.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
